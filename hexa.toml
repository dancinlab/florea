# hexa.toml — Floréa manifest (HEXA family member, standalone brand)

[package]
name        = "florea"
display     = "Floréa"
emoji       = "🌸"
version     = "0.1.0"
family      = "hexa"   # HEXA n=6 invariant-lattice family member (no hexa- prefix)
substrate   = "cosmetic·aesthetic·skincare·perfumery"
description = "🌸 Floréa — n=6 cosmetic/aesthetic substrate, decomposed from hexa-medic 2026-05-12"

# ── Verb manifest (7 .md verbs + 1 tape-only domain) ──────────────
verb_parent = "."
[verbs]
cosmetic_surgery        = ["cosmetic-surgery"]
hair_regeneration       = ["hair-regeneration"]
mens_intimate_cleanser  = ["mens-intimate-cleanser"]
perfumery               = ["perfumery"]
skincare                = ["skincare"]
tattoo_removal          = ["tattoo-removal"]
womens_intimate_cleanser = ["womens-intimate-cleanser"]
# Tape-only domain: split out of hair_regeneration 2026-05-15 (male-pattern
# AGA). No .md subdir — root ANDROGENETIC-ALOPECIA.tape is the SSOT.
# Analyzable via `florea analyze androgenetic_alopecia`.
androgenetic_alopecia   = ["ANDROGENETIC-ALOPECIA.tape"]

[dependencies]
hexa-lang = ">=1.0.0"
python    = ">=3.10"
# Optional sister-repo dependency for analytic work (n=6 anchor verification,
# selftest gates, Python witnesses). Invoked via CLI shell-out from
# `florea analyze <verb>`. SKIP (honest) if not reachable on host — see
# AGENTS.tape @D g_use_hexa_bio_cli.
hexa-bio  = { version = ">=1.0.0", optional = true }
